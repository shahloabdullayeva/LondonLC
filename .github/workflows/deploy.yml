name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/london-lc-website-btFT9
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /LondonLC
          NEXT_PUBLIC_SUPABASE_URL: https://jiccyfcnbrhxciomwcmp.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImppY2N5ZmNuYnJoeGNpb213Y21wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Mjg0ODQsImV4cCI6MjA4OTAwNDQ4NH0.FRNJm6sWMwYRu_p7ycL8gOq6A6uaL72CFQEDcqKskkk

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
