<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 560" width="780" height="560" font-family="Arial, sans-serif" font-size="13">

  <!-- Background -->
  <rect width="780" height="560" fill="#f8f8f8" stroke="#ccc" stroke-width="1"/>

  <!-- Title -->
  <text x="390" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">The Falkirk Wheel – Diagram</text>

  <!-- ======================================================= -->
  <!-- GROUND LINE -->
  <!-- ======================================================= -->
  <line x1="30" y1="370" x2="750" y2="370" stroke="#888" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="755" y="374" font-size="11" fill="#888">ground</text>

  <!-- ======================================================= -->
  <!-- LOWER CANAL BASIN (bottom left) -->
  <!-- ======================================================= -->
  <rect x="60" y="340" width="160" height="30" fill="#a8d8ea" stroke="#555" stroke-width="1.5"/>
  <text x="140" y="361" text-anchor="middle" font-size="11" fill="#333">canal basin</text>

  <!-- Gates (two vertical bars at mouth of basin) -->
  <rect x="215" y="330" width="8" height="42" fill="#666" stroke="#333" stroke-width="1"/>
  <rect x="226" y="330" width="8" height="42" fill="#666" stroke="#333" stroke-width="1"/>

  <!-- Label 20 – gates -->
  <line x1="234" y1="335" x2="280" y2="305" stroke="#333" stroke-width="1"/>
  <rect x="281" y="290" width="88" height="22" fill="white" stroke="#333" stroke-width="1" rx="3"/>
  <text x="325" y="305" text-anchor="middle" font-size="12" fill="#222"><tspan font-weight="bold">20</tspan> ___________</text>

  <!-- ======================================================= -->
  <!-- THE FALKIRK WHEEL STRUCTURE -->
  <!-- ======================================================= -->

  <!-- Support tower / base structure -->
  <rect x="325" y="200" width="40" height="170" fill="#d0d0d0" stroke="#555" stroke-width="1.5"/>
  <rect x="315" y="355" width="60" height="20" fill="#b0b0b0" stroke="#555" stroke-width="1.5"/>

  <!-- Axle (centre circle) -->
  <circle cx="345" cy="260" r="22" fill="#e0e0e0" stroke="#333" stroke-width="2"/>
  <circle cx="345" cy="260" r="8" fill="#888" stroke="#333" stroke-width="1.5"/>

  <!-- Cogs (gear teeth around axle) -->
  <g transform="translate(345,260)">
    <rect x="-28" y="-4" width="10" height="8" fill="#555" rx="1"/>
    <rect x="18" y="-4" width="10" height="8" fill="#555" rx="1"/>
    <rect x="-4" y="-28" width="8" height="10" fill="#555" rx="1"/>
    <rect x="-4" y="18" width="8" height="10" fill="#555" rx="1"/>
    <rect x="-21" y="-21" width="8" height="8" fill="#555" rx="1" transform="rotate(45 -17 -17)"/>
    <rect x="13" y="-21" width="8" height="8" fill="#555" rx="1" transform="rotate(-45 17 -17)"/>
    <rect x="-21" y="13" width="8" height="8" fill="#555" rx="1" transform="rotate(-45 -17 17)"/>
    <rect x="13" y="13" width="8" height="8" fill="#555" rx="1" transform="rotate(45 17 17)"/>
  </g>

  <!-- Wheel arms (two gondola arms forming the Celtic-inspired shape) -->
  <!-- Arm 1: upper-left to lower-right -->
  <line x1="345" y1="260" x2="175" y2="290" stroke="#555" stroke-width="6"/>
  <line x1="345" y1="260" x2="515" y2="230" stroke="#555" stroke-width="6"/>
  <!-- Arm 2: upper-right to lower-left (cross arm) -->
  <line x1="345" y1="260" x2="190" y2="230" stroke="#444" stroke-width="5"/>
  <line x1="345" y1="260" x2="500" y2="290" stroke="#444" stroke-width="5"/>

  <!-- Gondola 1 (lower left - at water level) -->
  <rect x="130" y="282" width="80" height="26" fill="#a8d8ea" stroke="#333" stroke-width="1.5" rx="2"/>
  <text x="170" y="299" text-anchor="middle" font-size="10" fill="#333">gondola</text>
  <!-- Water in gondola -->
  <rect x="132" y="288" width="76" height="8" fill="#7bc8e0" opacity="0.6"/>

  <!-- Gondola 2 (upper right - at aqueduct level) -->
  <rect x="480" y="215" width="80" height="26" fill="#a8d8ea" stroke="#333" stroke-width="1.5" rx="2"/>
  <text x="520" y="232" text-anchor="middle" font-size="10" fill="#333">gondola</text>
  <!-- Water in gondola -->
  <rect x="482" y="221" width="76" height="8" fill="#7bc8e0" opacity="0.6"/>

  <!-- Clamp (where wheel attaches to support structure) -->
  <rect x="320" y="278" width="50" height="14" fill="#888" stroke="#333" stroke-width="1.5" rx="2"/>
  <rect x="328" y="274" width="34" height="8" fill="#aaa" stroke="#333" stroke-width="1"/>

  <!-- Label 21 – clamp -->
  <line x1="320" y1="285" x2="260" y2="315" stroke="#333" stroke-width="1"/>
  <rect x="170" y="310" width="88" height="22" fill="white" stroke="#333" stroke-width="1" rx="3"/>
  <text x="214" y="325" text-anchor="middle" font-size="12" fill="#222"><tspan font-weight="bold">21</tspan> ___________</text>

  <!-- Label 22 – axle -->
  <line x1="345" y1="238" x2="345" y2="195" stroke="#333" stroke-width="1"/>
  <rect x="296" y="178" width="98" height="22" fill="white" stroke="#333" stroke-width="1" rx="3"/>
  <text x="345" y="193" text-anchor="middle" font-size="12" fill="#222"><tspan font-weight="bold">22</tspan> ___________</text>

  <!-- Label 23 – cogs -->
  <line x1="367" y1="260" x2="410" y2="240" stroke="#333" stroke-width="1"/>
  <rect x="411" y="228" width="98" height="22" fill="white" stroke="#333" stroke-width="1" rx="3"/>
  <text x="460" y="243" text-anchor="middle" font-size="12" fill="#222"><tspan font-weight="bold">23</tspan> ___________</text>

  <!-- ======================================================= -->
  <!-- AQUEDUCT (upper right – elevated water channel) -->
  <!-- ======================================================= -->
  <rect x="555" y="195" width="165" height="28" fill="#a8d8ea" stroke="#555" stroke-width="1.5"/>
  <!-- Aqueduct walls -->
  <rect x="555" y="195" width="165" height="6" fill="#999" stroke="#555" stroke-width="1"/>
  <rect x="555" y="217" width="165" height="6" fill="#999" stroke="#555" stroke-width="1"/>
  <text x="637" y="213" text-anchor="middle" font-size="11" fill="#333">aqueduct water channel</text>

  <!-- Aqueduct support pillars -->
  <rect x="570" y="223" width="12" height="60" fill="#aaa" stroke="#666" stroke-width="1"/>
  <rect x="610" y="223" width="12" height="60" fill="#aaa" stroke="#666" stroke-width="1"/>
  <rect x="650" y="223" width="12" height="60" fill="#aaa" stroke="#666" stroke-width="1"/>
  <rect x="690" y="223" width="12" height="60" fill="#aaa" stroke="#666" stroke-width="1"/>

  <!-- Label 24 – aqueduct -->
  <line x1="637" y1="195" x2="637" y2="165" stroke="#333" stroke-width="1"/>
  <rect x="588" y="148" width="98" height="22" fill="white" stroke="#333" stroke-width="1" rx="3"/>
  <text x="637" y="163" text-anchor="middle" font-size="12" fill="#222"><tspan font-weight="bold">24</tspan> ___________</text>

  <!-- ======================================================= -->
  <!-- TUNNEL (underground, middle section) -->
  <!-- ======================================================= -->
  <!-- Ground surface above tunnel -->
  <rect x="395" y="358" width="160" height="12" fill="#c8b87a" stroke="#888" stroke-width="1"/>
  <text x="475" y="344" text-anchor="middle" font-size="10" fill="#666">Roman wall above</text>

  <!-- Tunnel bore -->
  <ellipse cx="395" cy="390" rx="18" ry="12" fill="#555" stroke="#333" stroke-width="1.5"/>
  <rect x="378" y="378" width="160" height="24" fill="#666" stroke="#444" stroke-width="1"/>
  <ellipse cx="555" cy="390" rx="18" ry="12" fill="#444" stroke="#333" stroke-width="1.5"/>
  <!-- Tunnel interior highlight -->
  <rect x="378" y="382" width="160" height="16" fill="#888" opacity="0.4"/>
  <text x="467" y="396" text-anchor="middle" font-size="11" fill="#eee">tunnel</text>

  <!-- Label 25 – wall (Roman wall) -->
  <line x1="475" y1="358" x2="475" y2="330" stroke="#333" stroke-width="1"/>
  <rect x="426" y="313" width="98" height="22" fill="white" stroke="#333" stroke-width="1" rx="3"/>
  <text x="475" y="328" text-anchor="middle" font-size="12" fill="#222"><tspan font-weight="bold">25</tspan> ___________</text>

  <!-- ======================================================= -->
  <!-- LOCKS (far right, stepping up 11 m) -->
  <!-- ======================================================= -->
  <!-- Water channel leading to locks -->
  <rect x="555" y="380" width="40" height="16" fill="#a8d8ea" stroke="#555" stroke-width="1"/>

  <!-- Lock chambers (stepped) -->
  <rect x="595" y="360" width="45" height="36" fill="#a8d8ea" stroke="#555" stroke-width="1.5"/>
  <rect x="640" y="340" width="45" height="56" fill="#a8d8ea" stroke="#555" stroke-width="1.5"/>
  <rect x="685" y="318" width="45" height="78" fill="#a8d8ea" stroke="#555" stroke-width="1.5"/>

  <!-- Lock gate lines -->
  <line x1="595" y1="370" x2="640" y2="370" stroke="#555" stroke-width="2"/>
  <line x1="640" y1="350" x2="685" y2="350" stroke="#555" stroke-width="2"/>
  <line x1="685" y1="328" x2="730" y2="328" stroke="#555" stroke-width="2"/>

  <!-- 11m arrow -->
  <line x1="735" y1="328" x2="735" y2="396" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="735" y1="328" x2="735" y2="260" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="748" y="365" font-size="10" fill="#555">11 m</text>

  <!-- Label 26 – locks -->
  <line x1="660" y1="340" x2="660" y2="300" stroke="#333" stroke-width="1"/>
  <rect x="611" y="283" width="98" height="22" fill="white" stroke="#333" stroke-width="1" rx="3"/>
  <text x="660" y="298" text-anchor="middle" font-size="12" fill="#222"><tspan font-weight="bold">26</tspan> ___________</text>

  <!-- ======================================================= -->
  <!-- UNION CANAL label (top right) -->
  <!-- ======================================================= -->
  <text x="710" y="190" text-anchor="middle" font-size="11" fill="#336699" font-weight="bold">Union Canal</text>
  <line x1="710" y1="195" x2="710" y2="213" stroke="#336699" stroke-width="1.5"/>

  <!-- Forth &amp; Clyde canal label (bottom left) -->
  <text x="140" y="390" text-anchor="middle" font-size="10" fill="#336699">Forth &amp; Clyde Canal</text>

  <!-- ======================================================= -->
  <!-- ARROWS / DIRECTION indicators -->
  <!-- ======================================================= -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Rotation arrows on wheel -->
  <path d="M 308,235 A 45,45 0 0,1 370,220" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- ======================================================= -->
  <!-- WATER FLOW ARROWS -->
  <!-- ======================================================= -->
  <!-- Basin to gondola -->
  <line x1="220" y1="355" x2="230" y2="295" stroke="#336699" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Gondola 2 to aqueduct -->
  <line x1="555" y1="228" x2="558" y2="222" stroke="#336699" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Aqueduct to locks (via tunnel) -->
  <line x1="615" y1="222" x2="560" y2="390" stroke="#336699" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ======================================================= -->
  <!-- LEGEND / INSTRUCTIONS -->
  <!-- ======================================================= -->
  <rect x="30" y="420" width="720" height="120" fill="#fff" stroke="#ccc" stroke-width="1" rx="4"/>
  <text x="390" y="440" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Label the diagram. Choose ONE WORD from the passage for each answer.</text>

  <text x="50" y="462" font-size="12" fill="#222"><tspan font-weight="bold">20</tspan> A pair of ___________ are lifted in order to shut out water from canal basin.</text>
  <text x="50" y="480" font-size="12" fill="#222"><tspan font-weight="bold">21</tspan> A ___________ is taken out, enabling Wheel to rotate.</text>
  <text x="50" y="498" font-size="12" fill="#222"><tspan font-weight="bold">22</tspan> Hydraulic motors drive ___________.</text>
  <text x="50" y="516" font-size="12" fill="#222"><tspan font-weight="bold">23</tspan> A range of different-sized ___________ ensures boat keeps upright.</text>
  <text x="400" y="462" font-size="12" fill="#222"><tspan font-weight="bold">24</tspan> Boat reaches top of Wheel, then moves directly onto ___________.</text>
  <text x="400" y="480" font-size="12" fill="#222"><tspan font-weight="bold">25</tspan> Boat travels through tunnel beneath Roman ___________.</text>
  <text x="400" y="498" font-size="12" fill="#222"><tspan font-weight="bold">26</tspan> ___________ raise boat 11 m to level of Union Canal.</text>
</svg>
