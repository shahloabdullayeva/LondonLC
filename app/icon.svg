<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320">
  <rect width="320" height="320" rx="48" fill="#ffffff"/>
  <!-- Lavender swoosh behind the wordmark -->
  <path d="M 30 200 Q 110 110 180 170 Q 260 230 300 140"
        fill="none" stroke="#8b7bc8" stroke-width="34" stroke-linecap="round" opacity="0.55"/>
  <!-- London wordmark -->
  <text x="160" y="195"
        font-family="Georgia, 'Iowan Old Style', 'Times New Roman', serif"
        font-size="82"
        font-weight="700"
        fill="#2d1b5e"
        text-anchor="middle"
        letter-spacing="-2">London</text>
  <!-- Tagline -->
  <text x="160" y="228"
        font-family="Georgia, 'Iowan Old Style', 'Times New Roman', serif"
        font-size="20"
        font-style="italic"
        fill="#8b7bc8"
        text-anchor="middle"
        letter-spacing="0.3">You deserve more!</text>
</svg>
